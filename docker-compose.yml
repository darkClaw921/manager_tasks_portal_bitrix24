services:
  taskhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskhub
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/taskhub.db
      - ENABLE_CRON=true
    volumes:
      - taskhub-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  taskhub-data:
    driver: local
