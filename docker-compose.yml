# ============================================================
# TaskHub — Full stack (app + Meetings)
# ------------------------------------------------------------
# Services:
#   taskhub         Next.js + cron
#   livekit         LiveKit SFU (signaling + WebRTC)
#   livekit-egress  LiveKit egress worker (room composite / track recording)
#   redis           psrpc bus shared by livekit + livekit-egress
#   meeting-worker  Fastify: LiveKit webhooks + egress + ffmpeg muxer
#
# Shared named volume `taskhub-data` holds:
#   /app/data/taskhub.db          (SQLite WAL, shared writers)
#   /app/data/recordings/         (per-user OGG + mixed MP4 + final MKV)
#
# Run:
#   docker compose --env-file .env.production up --build
# ============================================================

services:
  taskhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskhub
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/taskhub.db
      - ENABLE_CRON=true
      - LIVEKIT_URL=ws://livekit:7880
      - MEETING_WORKER_URL=http://meeting-worker:3100
    volumes:
      - taskhub-data:/app/data
    depends_on:
      livekit:
        condition: service_started
      meeting-worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:${PORT:-3000}/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: taskhub-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  livekit:
    image: livekit/livekit-server:latest
    container_name: taskhub-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"                    # WebSocket / HTTP signaling
      - "7881:7881"                    # TCP fallback
      - "50000-50100:50000-50100/udp"  # WebRTC media
    depends_on:
      redis:
        condition: service_started
    # NOTE: LiveKit reads keys + webhook.api_key from infra/livekit.yaml only.
    # Keep that file in sync with LIVEKIT_API_KEY / LIVEKIT_API_SECRET from .env.
    # (scripts/deploy-dev.sh prints the warning to do this on generation.)

  livekit-egress:
    image: livekit/egress:latest
    container_name: taskhub-livekit-egress
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN                      # required by the headless Chrome sandbox
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./infra/egress.yaml:/etc/egress.yaml:ro
      - taskhub-data:/app/data
    depends_on:
      redis:
        condition: service_started
      livekit:
        condition: service_started

  meeting-worker:
    build:
      context: ./meeting-server
      dockerfile: Dockerfile
    container_name: taskhub-meeting-worker
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3100"
      LIVEKIT_URL: http://livekit:7880
      DB_PATH: /app/data/taskhub.db
      RECORDINGS_DIR: /app/data/recordings
    volumes:
      - taskhub-data:/app/data
    depends_on:
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  taskhub-data:
    driver: local
